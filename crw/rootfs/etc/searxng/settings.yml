---
# Bundled SearXNG configuration, based on crw's sidecar config
# (us/crw config/searxng/settings.yml) — search flows only through
# crw /v1/search, mirroring the upstream docker-compose stack.
# @SECRET_KEY@ / @SAFE_SEARCH@ are rendered at boot by the s6 run script.
use_default_settings: true

general:
  instance_name: CRW Web Tools
  privacypolicy_url: false
  contact_url: false
  donation_url: false
  enable_metrics: false

search:
  safe_search: '@SAFE_SEARCH@'
  autocomplete: ''
  default_lang: auto
  # JSON format must be explicitly enabled — SearXNG returns 403 on
  # `?format=json` otherwise. html kept for debugging.
  formats:
    - html
    - json

server:
  secret_key: '@SECRET_KEY@'
  bind_address: 127.0.0.1
  port: 8080
  # Rate limiting stays off (would need Valkey/Redis); the only client is
  # crw-server on loopback.
  limiter: false
  public_instance: false
  image_proxy: false
  method: GET
